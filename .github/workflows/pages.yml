name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Cache busting is now handled at runtime — index.html sets
      # window.__PENUMBRA_BUILD__ to Date.now() on every load, and
      # main.js propagates that as `?v=` on every dynamic import. No
      # build-time stamping needed.
      # First-time setup: in the repo's Settings → Pages, set
      # "Source: GitHub Actions". After that this workflow deploys
      # automatically on every push to main.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
