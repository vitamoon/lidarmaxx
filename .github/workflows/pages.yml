name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build hash into index.html
        # The short SHA gets sed-stamped into three places:
        #   1. The build pill in the top-right (visual confirmation of
        #      which commit is live).
        #   2. The cache-buster on the entry script tag (`?v=__BUILD__`).
        #   3. The cache-buster on the stylesheet (same).
        # Without (2)+(3) the GitHub Pages 10-min cache TTL serves stale
        # modules after a push and users see ghost errors that don't
        # match the on-disk source.
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|<span id=\"build-hash\">—</span>|<span id=\"build-hash\">${SHA}</span>|" index.html
          sed -i "s|__BUILD__|${SHA}|g" index.html
          echo "Stamped SHA=${SHA} into index.html"
          grep -E "(build-hash|__BUILD__|\\?v=)" index.html || true
      # First-time setup: in the repo's Settings → Pages, set
      # "Source: GitHub Actions". After that this workflow deploys
      # automatically on every push to main.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
