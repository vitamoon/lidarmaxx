name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build hash into index.html
        # We embed the short SHA into the page so the build pill in the
        # top-right shows what's actually deployed. Failing to stamp is
        # not a deploy-blocker — the page falls back to a wall-clock id.
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|<span id=\"build-hash\">—</span>|<span id=\"build-hash\">${SHA}</span>|" index.html || true
      # First-time setup: in the repo's Settings → Pages, set
      # "Source: GitHub Actions". After that this workflow deploys
      # automatically on every push to main.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
