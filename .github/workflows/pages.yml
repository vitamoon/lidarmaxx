name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build hash into index.html
        # The short SHA gets stamped in two places: the build pill, and
        # the cache-buster query (`?v=__BUILD__`) on the script + CSS
        # tags. Without the cache-buster, GitHub Pages's 10-min TTL
        # serves stale modules after each push.
        #
        # Implemented as a checked-in Node script so any failure surfaces
        # as a real error (set -e + script-level assertions) instead of a
        # silent no-op like our earlier sed/heredoc attempts.
        run: |
          set -e
          SHA="$(git rev-parse --short HEAD)"
          node scripts/stamp-build.mjs "$SHA"
      # First-time setup: in the repo's Settings → Pages, set
      # "Source: GitHub Actions". After that this workflow deploys
      # automatically on every push to main.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
