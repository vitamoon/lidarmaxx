name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build hash into index.html
        # The short SHA gets stamped in three places: the build pill,
        # the script tag cache-buster, and the stylesheet cache-buster.
        # Without the cache-busters, GitHub Pages's 10-minute TTL serves
        # stale modules after a push.
        run: |
          set -e
          SHA=$(git rev-parse --short HEAD)
          echo "::group::before"
          grep -nE "(build-hash|__BUILD__)" index.html || true
          echo "::endgroup::"
          # Use python for substitution to dodge sed's locale/charset
          # quirks with the em-dash in the build-pill placeholder.
          python3 - <<PY
          import re
          path = 'index.html'
          src = open(path, encoding='utf-8').read()
          src = src.replace('__BUILD__', '${SHA}')
          src = re.sub(
              r'<span id="build-hash">[^<]*</span>',
              f'<span id="build-hash">${SHA}</span>',
              src, count=1)
          open(path, 'w', encoding='utf-8').write(src)
          PY
          echo "::group::after"
          grep -nE "(build-hash|__BUILD__|\\?v=)" index.html || true
          echo "::endgroup::"
      # First-time setup: in the repo's Settings → Pages, set
      # "Source: GitHub Actions". After that this workflow deploys
      # automatically on every push to main.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
